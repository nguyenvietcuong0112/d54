name: easy_ads_flutter
description: Easy Ads is a wrapper around famous ad packages which let you integrate ads easily
version: 1.0.6
homepage: https://github.com/nooralibutt/easy-ads
repository: https://github.com/nooralibutt/easy-ads

environment:
  sdk: ">=2.17.5 <3.0.0"
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  google_mobile_ads: ^9.0.0
  collection: ^1.16.0
  logger: ^1.1.0
  shimmer: ^2.0.0
  flutter_spinkit: ^5.2.0
  appsflyer_sdk: ^6.17.3
  firebase_core: ^4.0.0
  firebase_analytics: ^12.0.0

  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1