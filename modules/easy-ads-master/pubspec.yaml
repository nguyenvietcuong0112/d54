name: easy_ads_flutter
description: Easy Ads is a wrapper around famous ad packages which let you integrate ads easily
version: 1.0.6
homepage: https://github.com/nooralibutt/easy-ads
repository: https://github.com/nooralibutt/easy-ads

environment:
  sdk: ">=2.17.5 <3.0.0"
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  google_mobile_ads: ^8.0.0
  gma_mediation_applovin: ^2.6.1
  gma_mediation_ironsource: ^2.4.1
  gma_mediation_meta: ^1.5.2
  gma_mediation_mintegral: ^2.1.0
  gma_mediation_pangle: ^3.6.0
  gma_mediation_unity: ^1.8.0
  collection: ^1.16.0
  logger: ^1.1.0
  shimmer: ^2.0.0
  flutter_spinkit: ^5.2.0
  adjust_sdk: ^5.6.2
  firebase_core: ^3.4.0
  firebase_analytics: ^11.3.0

  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1